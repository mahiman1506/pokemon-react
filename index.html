<!doctype html>

<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Viewport (Mobile Optimization) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page Title -->

    <title>PokSphere | Explore Pokémon Stats, Abilities & Evolutions</title>

    <!-- SEO Meta Tags -->

    <meta
      name="description"
      content="PokSphere is a modern Pokémon explorer where you can search Pokémon, view stats, abilities, evolutions and detailed information using PokéAPI."
    />
    <meta
      name="keywords"
      content="pokemon, pokedex, pokemon search, pokemon stats, pokemon abilities, pokemon react app, pokesphere"
    />
    <meta name="author" content="Mahiman Bhatt" />

    <!-- Search Engine Indexing -->

    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->

    <meta name="theme-color" content="#ffcb05" />

    <!-- Canonical URL -->

    <link rel="canonical" href="https://pok-sphere.netlify.app/" />

    <!-- Favicon -->

    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->

    <meta property="og:title" content="PokSphere - Pokémon Explorer" />
    <meta
      property="og:description"
      content="Search Pokémon and explore stats, abilities, evolutions and more in a modern Pokédex."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pok-sphere.netlify.app/" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter SEO -->

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PokSphere - Pokémon Explorer" />
    <meta
      name="twitter:description"
      content="Search Pokémon and explore stats, abilities, evolutions and more."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Performance Optimization -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Font -->

    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- React Root -->
    <div id="root"></div>

    <!-- React App Script -->

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
